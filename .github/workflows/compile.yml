name: "Compile"
on:
    push:
    pull_request:
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    build:
        name: Build (${{ matrix.os-name }}, ${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - {
                          os-name: Linux,
                          arch: x86,
                          runner: ubuntu-latest,
                          target: i686-unknown-linux-gnu,
                          artifact: linux-x86,
                          features: "",
                      }
                    - {
                          os-name: Linux,
                          arch: x86_64,
                          runner: ubuntu-latest,
                          target: x86_64-unknown-linux-gnu,
                          artifact: linux-x86_64,
                          features: "",
                      }
                    - {
                          os-name: Windows,
                          arch: x86,
                          runner: windows-latest,
                          target: i686-pc-windows-msvc,
                          artifact: windows-x86,
                          features: "vc-ltl",
                      }
                    - {
                          os-name: Windows,
                          arch: x86_64,
                          runner: windows-latest,
                          target: x86_64-pc-windows-msvc,
                          artifact: windows-x86_64,
                          features: "vc-ltl",
                      }
        steps:
            - uses: actions/checkout@v6
            - name: Setup Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  target: ${{ matrix.target }}
            - name: Install gcc-multilib (if needed)
              if: ${{ matrix.target == 'i686-unknown-linux-gnu' }}
              run: sudo apt-get install -y gcc-multilib
            - name: Compile
              run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}
            - name: Upload Binary
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.artifact }}
                  path: |
                      target/*-pc-windows-msvc/release/zeekstdc.dll*
                      target/*-pc-windows-msvc/release/zeekstdc.pdb
                      target/*-unknown-linux-gnu/release/libzeekstdc.so
